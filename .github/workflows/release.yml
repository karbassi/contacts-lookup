name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - run: swift build -c release --arch arm64

      - run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/apple-contacts-cli \
            .build/x86_64-apple-macosx/release/apple-contacts-cli \
            -output apple-contacts-cli
          chmod +x apple-contacts-cli
          lipo -archs apple-contacts-cli
          file apple-contacts-cli

      - name: Create release archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="apple-contacts-cli-${VERSION}-macos-universal.tar.gz"
          tar czf "${ARCHIVE}" apple-contacts-cli
          SHA256=$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "${SHA256}  ${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Extract changelog
        run: |
          VERSION_NO_V="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[${VERSION_NO_V}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "NOTES<<CHANGELOG_EOF" >> "$GITHUB_ENV"
          echo "${NOTES}" >> "$GITHUB_ENV"
          echo "CHANGELOG_EOF" >> "$GITHUB_ENV"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ env.NOTES }}
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          SHA256="${{ env.SHA256 }}"
          ARCHIVE="${{ env.ARCHIVE }}"
          URL="https://github.com/karbassi/apple-contacts-cli/releases/download/${VERSION}/${ARCHIVE}"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/karbassi/homebrew-tap.git" tap

          export VERSION_NO_V SHA256 URL
          envsubst < .github/formula.rb.tmpl > tap/Formula/apple-contacts-cli.rb

          cd tap
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add Formula/apple-contacts-cli.rb
          git commit -m "apple-contacts-cli ${VERSION}"
          git push
