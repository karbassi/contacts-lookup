name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/contacts-lookup \
            .build/x86_64-apple-macosx/release/contacts-lookup \
            -output contacts-lookup
          chmod +x contacts-lookup

      - name: Verify binary
        run: |
          lipo -archs contacts-lookup
          file contacts-lookup

      - name: Create release archive
        run: |
          VERSION="${{ github.ref_name }}"
          ARCHIVE="contacts-lookup-${VERSION}-macos-universal.tar.gz"
          tar czf "${ARCHIVE}" contacts-lookup
          SHA256=$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"
          echo "SHA256=${SHA256}" >> "$GITHUB_ENV"
          echo "${SHA256}  ${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NO_V="${VERSION#v}"
          SHA256="${{ env.SHA256 }}"
          ARCHIVE="${{ env.ARCHIVE }}"

          git clone https://x-access-token:${GH_TOKEN}@github.com/karbassi/homebrew-tap.git tap
          cd tap

          cat > Formula/contacts-lookup.rb <<FORMULA
class ContactsLookup < Formula
  desc "Resolve phone numbers to macOS contact names"
  homepage "https://github.com/karbassi/contacts-lookup"
  version "${VERSION_NO_V}"
  license "MIT"

  on_macos do
    url "https://github.com/karbassi/contacts-lookup/releases/download/${VERSION}/${ARCHIVE}"
    sha256 "${SHA256}"

    def install
      bin.install "contacts-lookup"
    end
  end

  test do
    assert_match "OVERVIEW", shell_output("#{bin}/contacts-lookup --help")
  end
end
FORMULA

          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add Formula/contacts-lookup.rb
          git commit -m "contacts-lookup ${VERSION}"
          git push
