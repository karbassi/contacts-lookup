name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, format, test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Lint (SwiftLint)
        run: mise run lint

      - name: Format check (swiftformat)
        run: mise run format:check

      - name: Test
        run: mise run test
